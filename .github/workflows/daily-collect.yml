name: Daily Collect

on:
  schedule:
    # UTC 08:00 = Beijing 16:00
    - cron: '0 8 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run collection pipeline
        run: python pipeline/pipeline.py --sources github,rss --limit 20 --verbose
        env:
          LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Validate article JSON format
        run: python hooks/validate_json.py knowledge/articles/*.json

      - name: Check article quality
        run: python hooks/check_quality.py knowledge/articles/*.json

      - name: Commit and push new articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/articles/
          if git diff --cached --quiet; then
            echo "No new articles, skipping commit"
          else
            COUNT=$(git diff --cached --name-only -- knowledge/articles/ | wc -l)
            git commit -m "Daily collect: ${COUNT} new articles on $(date +%Y-%m-%d)"
            git push
          fi
